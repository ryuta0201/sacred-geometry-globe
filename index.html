#ui {

.control .value { font-size: 11px; color: #6af; float: right; margin-top: -16px; }
button.toggle {

  background: rgba(255,255,255,0.05); color: #fff; border-radius: 4px;

}
button.toggle:hover { background: rgba(255,255,255,0.15); }
button.toggle.active { background: rgba(100,170,255,0.2); border-color: #6af; }

.checkbox-control { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.checkbox-control input { accent-color: #6af; }
.checkbox-control label { font-size: 11px; color: #ccc; margin: 0; text-transform: none; }

#info {
  position: fixed; bottom: 16px; left: 16px;
  font-size: 11px; color: #666; z-index: 10;
}

#pin-info {
  margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.1);
  font-size: 11px; color: #888; line-height: 1.6;
  max-height: 50vh; overflow-y: auto;
}
#pin-info a { color: #6af; text-decoration: none; }
#pin-info a:hover { text-decoration: underline; }
.vertex-row { margin-bottom: 6px; }
.vertex-coords { color: #999; }
.vertex-place { color: #ccc; font-size: 10px; margin-left: 2px; }
.vertex-place.loading { color: #555; font-style: italic; }

// ─── Math Utilities ──────────────────────────────────────────
function latLonToVec3(lat, lon, r = 1) {
  const phi = (90 - lat) * DEG;
  const theta = (lon + 180) * DEG;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta)
  );
}

function vec3ToLatLon(v) {
  const r = v.length();
  const lat = 90 - Math.acos(v.y / r) / DEG;
  const lon = Math.atan2(v.z, -v.x) / DEG - 180;
  return { lat, lon: ((lon + 540) % 360) - 180 };
}

function slerp(a, b, t) {
  const dot = Math.max(-1, Math.min(1, a.dot(b)));
  const omega = Math.acos(dot);
  if (omega < 1e-6) return a.clone().lerp(b, t);
  const sinO = Math.sin(omega);
  return a.clone().multiplyScalar(Math.sin((1 - t) * omega) / sinO)
    .add(b.clone().multiplyScalar(Math.sin(t * omega) / sinO));
}

// ─── Icosahedron Data ────────────────────────────────────────
function makeIcosahedronData() {
  const t = PHI;
  const raw = [
    [-1, t, 0], [1, t, 0], [-1, -t, 0], [1, -t, 0],
    [0, -1, t], [0, 1, t], [0, -1, -t], [0, 1, -t],
    [t, 0, -1], [t, 0, 1], [-t, 0, -1], [-t, 0, 1],
  ];
  const vertices = raw.map(([x, y, z]) => new THREE.Vector3(x, y, z).normalize());
  const faces = [
    [0,11,5],[0,5,1],[0,1,7],[0,7,10],[0,10,11],
    [1,5,9],[5,11,4],[11,10,2],[10,7,6],[7,1,8],
    [3,9,4],[3,4,2],[3,2,6],[3,6,8],[3,8,9],
    [4,9,5],[2,4,11],[6,2,10],[8,6,7],[9,8,1],
  ];
  const edges = new Set();
  faces.forEach(([a, b, c]) => {
    [a*12+b, b*12+a, b*12+c, c*12+b, a*12+c, c*12+a].forEach(k => edges.add(k));
  });
  const edgeList = [];
  edges.forEach(k => {
    const a = Math.floor(k / 12), b = k % 12;
    if (a < b) edgeList.push([a, b]);
  });
  return { vertices, faces, edges: edgeList };
}

function pinIcosahedron(vertices, vertexIdx, targetLatLon, spinAngle = 0) {
  const target = latLonToVec3(targetLatLon.lat, targetLatLon.lon).normalize();
  const source = vertices[vertexIdx].clone().normalize();

  const qAlign = new THREE.Quaternion();
  qAlign.setFromUnitVectors(source, target);

  const qSpin = new THREE.Quaternion();
  qSpin.setFromAxisAngle(target, spinAngle * DEG);

  const qFinal = qSpin.multiply(qAlign);
  return vertices.map(v => v.clone().applyQuaternion(qFinal).normalize());
}

// ─── Geodesic Subdivision ────────────────────────────────────
function subdivideFace(v0, v1, v2, freq, radius) {
  const verts = [];
  const tris = [];
  const grid = [];

  for (let i = 0; i <= freq; i++) {
    grid[i] = [];
    for (let j = 0; j <= freq - i; j++) {
      const a = i / freq, b = j / freq, c = 1 - a - b;
      const p = new THREE.Vector3()
        .addScaledVector(v0, c)
        .addScaledVector(v1, a)
        .addScaledVector(v2, b)
        .normalize()
        .multiplyScalar(radius);
      grid[i][j] = verts.length;
      verts.push(p);
    }
  }

  for (let i = 0; i < freq; i++) {
    for (let j = 0; j < freq - i; j++) {
      tris.push([grid[i][j], grid[i + 1][j], grid[i][j + 1]]);
      if (j < freq - i - 1) {
        tris.push([grid[i + 1][j], grid[i + 1][j + 1], grid[i][j + 1]]);
      }
    }
  }

  return { verts, tris };
}

// ─── Flower of Life (circles at subdivision vertices) ────────
function createFOLCircles(verts, radius, circleRadius) {
  const points = [];
  const segments = 32;
  verts.forEach(v => {
    const normal = v.clone().normalize();
    const tangent = new THREE.Vector3(0, 1, 0);
    if (Math.abs(normal.dot(tangent)) > 0.99) tangent.set(1, 0, 0);
    const bitangent = new THREE.Vector3().crossVectors(normal, tangent).normalize();
    tangent.crossVectors(bitangent, normal).normalize();

    for (let i = 0; i <= segments; i++) {
      const angle = (i / segments) * Math.PI * 2;
      const p = v.clone()
        .addScaledVector(tangent, Math.cos(angle) * circleRadius)
        .addScaledVector(bitangent, Math.sin(angle) * circleRadius)
        .normalize()
        .multiplyScalar(radius);
      points.push(p);
      if (i > 0 && i <= segments) {
        // duplicate for line segments
      }
    }
  });
  return points;
}

// ─── Dymaxion Net Layout ─────────────────────────────────────
// BFS reflection unfolding: unfold icosahedron by reflecting each face
// across the shared edge with its parent in a spanning tree.
// This guarantees a connected net (all faces touch).

function buildDymaxionNet(faces) {
  // Build face adjacency: which faces share an edge
  const adj = faces.map(() => []);
  for (let i = 0; i < faces.length; i++) {
    for (let j = i + 1; j < faces.length; j++) {
      const shared = faces[i].filter(v => faces[j].includes(v));
      if (shared.length === 2) {
        adj[i].push({ face: j, edge: shared });
        adj[j].push({ face: i, edge: shared });
      }
    }
  }

  // Build spanning tree via BFS.
  // We control neighbor visit order to produce a horizontally-spreading layout.
  // Strategy: prefer neighbors that share the "base" edge (wider spread)
  // over neighbors that share "side" edges (which tend to fold back).
  const visited = new Set([0]);
  const queue = [0];
  const parentOf = new Array(20).fill(-1);
  const parentEdgeOf = new Array(20).fill(null);
  const order = [0];

  while (queue.length > 0) {
    const curr = queue.shift();
    for (const { face: next, edge } of adj[curr]) {
      if (!visited.has(next)) {
        visited.add(next);
        parentOf[next] = curr;
        parentEdgeOf[next] = edge;
        queue.push(next);
        order.push(next);
      }
    }
  }

  // Reflect point P across line A-B
  function reflect(P, A, B) {
    const dx = B[0] - A[0], dy = B[1] - A[1];
    const len2 = dx * dx + dy * dy;
    if (len2 < 1e-12) return [P[0], P[1]];
    const t = ((P[0] - A[0]) * dx + (P[1] - A[1]) * dy) / len2;
    return [2 * (A[0] + t * dx) - P[0], 2 * (A[1] + t * dy) - P[1]];
  }

  // Place face 0 as an equilateral triangle
  const h = Math.sqrt(3) / 2;
  const layout = new Array(20);
  layout[0] = { verts: [[0, 0], [1, 0], [0.5, h]] };

  // Unfold each face by reflecting the parent's opposite vertex across the shared edge
  for (let k = 1; k < order.length; k++) {
    const fi = order[k];
    const pi = parentOf[fi];
    const sharedEdge = parentEdgeOf[fi];

    const parFace3D = faces[pi];
    const parVerts2D = layout[pi].verts;

    // Find which 2D vertices of parent correspond to the shared 3D edge
    const ei0 = parFace3D.indexOf(sharedEdge[0]);
    const ei1 = parFace3D.indexOf(sharedEdge[1]);
    const oi = [0, 1, 2].find(i => i !== ei0 && i !== ei1);

    const A = parVerts2D[ei0];
    const B = parVerts2D[ei1];
    const C = parVerts2D[oi];
    const D = reflect(C, A, B); // new vertex

    // Map child face's 3D vertex indices to 2D positions
    const childFace3D = faces[fi];
    const childVerts = new Array(3);
    const ci0 = childFace3D.indexOf(sharedEdge[0]);
    const ci1 = childFace3D.indexOf(sharedEdge[1]);
    const ci2 = [0, 1, 2].find(i => i !== ci0 && i !== ci1);

    childVerts[ci0] = A;
    childVerts[ci1] = B;
    childVerts[ci2] = D;

    layout[fi] = { verts: childVerts };
  }

  // Center and scale the layout
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  layout.forEach(f => f.verts.forEach(([x, y]) => {
    minX = Math.min(minX, x); maxX = Math.max(maxX, x);
    minY = Math.min(minY, y); maxY = Math.max(maxY, y);
  }));

  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  const span = Math.max(maxX - minX, maxY - minY);
  const sc = 3.0 / span; // fit in ~3 units

  layout.forEach(f => {
    f.verts = f.verts.map(([x, y]) => [(x - cx) * sc, (y - cy) * sc]);
  });

  return layout;
}

// ─── App ─────────────────────────────────────────────────────
class App {
  constructor() {
    this.scene = new THREE.Scene();
    this.camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.01, 100);
    this.camera.position.set(0, 0, 3);

    this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    this.renderer.setSize(innerWidth, innerHeight);
    this.renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    document.body.appendChild(this.renderer.domElement);

    this.controls = new OrbitControls(this.camera, this.renderer.domElement);
    this.controls.enableDamping = true;
    this.controls.dampingFactor = 0.05;
    this.controls.minDistance = 1.2;
    this.controls.maxDistance = 10;

    // State
    this.mode = 'globe'; // 'globe' or 'flat'
    this.icosaData = makeIcosahedronData();
    this.pinCity = 'jerusalem';
    this.spinAngle = 0;
    this.frequency = 3;
    this.showFOL = true;
    this.showCities = true;
    this.pinnedVertices = [];
    this.transition = { active: false, progress: 0, direction: 1 };

    this.showPentagons = true;
    this.activePreset = 'none';

    this.groups = {
      globe: new THREE.Group(),
      icosa: new THREE.Group(),
      subdivision: new THREE.Group(),
      fol: new THREE.Group(),
      pentagons: new THREE.Group(),
      cities: new THREE.Group(),
      presetMarkers: new THREE.Group(),
      flat: new THREE.Group(),
    };

    Object.values(this.groups).forEach(g => this.scene.add(g));

    this.setupLighting();
    this.createGlobe();
    this.updateIcosahedron();
    this.createCityMarkers();
    this.setupUI();
    this.animate();

    window.addEventListener('resize', () => this.onResize());
  }

  setupLighting() {
    this.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dir = new THREE.DirectionalLight(0xffffff, 0.8);
    dir.position.set(5, 3, 5);
    this.scene.add(dir);
  }

  createGlobe() {
    const geo = new THREE.SphereGeometry(GLOBE_RADIUS, 64, 64);
    const loader = new THREE.TextureLoader();
    const mat = new THREE.MeshPhongMaterial({ color: 0x4488aa, specular: 0x222222 });

    this.earthTexture = null;
    loader.load('earth_texture.jpg', (tex) => {
      mat.map = tex;
      mat.color.set(0xffffff);
      mat.needsUpdate = true;
      this.earthTexture = tex;
    });

    this.earthMesh = new THREE.Mesh(geo, mat);
    this.groups.globe.add(this.earthMesh);
  }

  updateIcosahedron() {
    // Clear previous
    this.groups.icosa.clear();
    this.groups.subdivision.clear();
    this.groups.fol.clear();

    const city = CITIES[this.pinCity];
    this.pinnedVertices = pinIcosahedron(
      this.icosaData.vertices, 0,
      { lat: city.lat, lon: city.lon },
      this.spinAngle
    );

    // Draw icosahedron edges as great circle arcs (not straight lines)
    // so they stay on the sphere surface instead of cutting through it
    const edgePositions = [];
    const edgeSegments = 16; // subdivisions per edge
    this.icosaData.edges.forEach(([a, b]) => {
      const va = this.pinnedVertices[a].clone().normalize();
      const vb = this.pinnedVertices[b].clone().normalize();
      for (let s = 0; s < edgeSegments; s++) {
        const t0 = s / edgeSegments;
        const t1 = (s + 1) / edgeSegments;
        // Slerp to follow great circle arc
        const p0 = slerp(va, vb, t0).multiplyScalar(ICOSA_RADIUS);
        const p1 = slerp(va, vb, t1).multiplyScalar(ICOSA_RADIUS);
        edgePositions.push(p0.x, p0.y, p0.z, p1.x, p1.y, p1.z);
      }
    });

    const edgeGeo = new THREE.BufferGeometry();
    edgeGeo.setAttribute('position', new THREE.Float32BufferAttribute(edgePositions, 3));
    const edgeMat = new THREE.LineBasicMaterial({ color: 0x6af0ff, transparent: true, opacity: 0.7 });
    this.groups.icosa.add(new THREE.LineSegments(edgeGeo, edgeMat));

    // Draw vertex dots
    const dotGeo = new THREE.SphereGeometry(0.012, 8, 8);
    const dotMat = new THREE.MeshBasicMaterial({ color: 0x6af0ff });
    this.pinnedVertices.forEach((v, i) => {
      const dot = new THREE.Mesh(dotGeo, i === 0 ? new THREE.MeshBasicMaterial({ color: 0xff6633 }) : dotMat);
      dot.position.copy(v).multiplyScalar(ICOSA_RADIUS);
      this.groups.icosa.add(dot);
    });

    // Subdivision
    if (this.frequency > 1) {
      this.drawSubdivision();
    }

    // FOL
    if (this.showFOL) {
      this.drawFlowerOfLife();
    }

    // Pentagon defects
    this.groups.pentagons.clear();
    if (this.showPentagons) {
      this.drawPentagonDefects();
    }

    // Update vertex info
    this.updatePinInfo();
  }

  drawPentagonDefects() {
    const r = ICOSA_RADIUS + 0.003;
    const pentSize = 0.04; // angular size of pentagon marker

    this.pinnedVertices.forEach((v, i) => {
      const n = v.clone().normalize();
      // Local tangent frame
      let t1 = new THREE.Vector3(0, 1, 0);
      if (Math.abs(n.dot(t1)) > 0.99) t1.set(1, 0, 0);
      const t2 = new THREE.Vector3().crossVectors(n, t1).normalize();
      t1.crossVectors(t2, n).normalize();

      // Pentagon vertices
      const pentPoints = [];
      for (let j = 0; j < 5; j++) {
        const angle = (j / 5) * Math.PI * 2 - Math.PI / 2;
        const p = n.clone().multiplyScalar(Math.cos(pentSize))
          .addScaledVector(t1, Math.sin(pentSize) * Math.cos(angle))
          .addScaledVector(t2, Math.sin(pentSize) * Math.sin(angle))
          .normalize().multiplyScalar(r);
        pentPoints.push(p);
      }

      // Pentagon outline
      const linePos = [];
      for (let j = 0; j < 5; j++) {
        const a = pentPoints[j], b = pentPoints[(j + 1) % 5];
        linePos.push(a.x, a.y, a.z, b.x, b.y, b.z);
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(linePos, 3));
      const color = i === 0 ? 0xff4444 : 0xff6688;
      const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.9, linewidth: 2 });
      this.groups.pentagons.add(new THREE.LineSegments(geo, mat));

      // Filled pentagon (semi-transparent)
      const triPos = [];
      const center3D = n.clone().multiplyScalar(r);
      for (let j = 0; j < 5; j++) {
        triPos.push(center3D.x, center3D.y, center3D.z);
        triPos.push(pentPoints[j].x, pentPoints[j].y, pentPoints[j].z);
        triPos.push(pentPoints[(j + 1) % 5].x, pentPoints[(j + 1) % 5].y, pentPoints[(j + 1) % 5].z);
      }
      const fillGeo = new THREE.BufferGeometry();
      fillGeo.setAttribute('position', new THREE.Float32BufferAttribute(triPos, 3));
      const fillMat = new THREE.MeshBasicMaterial({
        color: i === 0 ? 0xff2222 : 0xff4466,
        transparent: true, opacity: 0.3, side: THREE.DoubleSide,
      });
      this.groups.pentagons.add(new THREE.Mesh(fillGeo, fillMat));
    });
  }

  drawSubdivision() {
    const linePositions = [];
    const r = ICOSA_RADIUS + 0.001;

    // Helper: push an arc between two points on the sphere
    const pushArc = (p0, p1, segs) => {
      for (let s = 0; s < segs; s++) {
        const a = slerp(p0.clone().normalize(), p1.clone().normalize(), s / segs).multiplyScalar(r);
        const b = slerp(p0.clone().normalize(), p1.clone().normalize(), (s+1) / segs).multiplyScalar(r);
        linePositions.push(a.x, a.y, a.z, b.x, b.y, b.z);
      }
    };
    // More arc segments for low frequency (larger triangles)
    const arcSegs = this.frequency <= 2 ? 4 : 2;

    this.icosaData.faces.forEach(([ai, bi, ci]) => {
      const a = this.pinnedVertices[ai];
      const b = this.pinnedVertices[bi];
      const c = this.pinnedVertices[ci];
      const { verts, tris } = subdivideFace(a, b, c, this.frequency, r);

      tris.forEach(([i, j, k]) => {
        pushArc(verts[i], verts[j], arcSegs);
        pushArc(verts[j], verts[k], arcSegs);
        pushArc(verts[k], verts[i], arcSegs);
      });
    });

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));
    const mat = new THREE.LineBasicMaterial({ color: 0x44aaff, transparent: true, opacity: 0.3 });
    this.groups.subdivision.add(new THREE.LineSegments(geo, mat));
  }

  drawFlowerOfLife() {
    const r = ICOSA_RADIUS + 0.002;
    const segments = 48;

    // Flower of Life: all circles have the SAME angular radius on the sphere.
    // Each circle's center sits on the circumference of its neighbors.
    // This creates the classic overlapping pattern with Vesica Piscis intersections.
    //
    // We generate the FOL pattern on a tangent plane at each icosa face center,
    // using hexagonal grid placement, then project each circle onto the sphere.

    // Determine circle angular radius based on frequency:
    // Higher freq = smaller circles = more layers of the FOL pattern
    const layers = Math.max(this.frequency, 2);

    this.icosaData.faces.forEach(([ai, bi, ci]) => {
      const va = this.pinnedVertices[ai].clone().normalize();
      const vb = this.pinnedVertices[bi].clone().normalize();
      const vc = this.pinnedVertices[ci].clone().normalize();

      // Face center on sphere
      const center = new THREE.Vector3().add(va).add(vb).add(vc).normalize();

      // Angular radius of each circle = edge angular span / (layers * 2)
      // so that the FOL fits nicely within each face
      const edgeAngle = Math.acos(Math.max(-1, Math.min(1, va.dot(vb))));
      const circleAngR = edgeAngle / (layers * 2);

      // Build local tangent frame at face center
      const up = center.clone();
      let tx = new THREE.Vector3().subVectors(va, center);
      tx.sub(up.clone().multiplyScalar(tx.dot(up))).normalize(); // project to tangent plane
      const ty = new THREE.Vector3().crossVectors(up, tx).normalize();

      // Generate FOL center positions using axial hex coordinates
      // In FOL, distance between adjacent centers = circleAngR (they pass through each other's centers)
      const step = circleAngR;
      const centers = [];
      const centerSet = new Set();

      for (let q = -layers * 2; q <= layers * 2; q++) {
        for (let s = -layers * 2; s <= layers * 2; s++) {
          // Axial to cartesian (flat-top hex)
          const px = step * (q + s * 0.5);
          const py = step * (s * Math.sqrt(3) / 2);

          // Check if this center is inside or near the triangle
          // Convert to a point on the sphere
          const pt = center.clone()
            .addScaledVector(tx, px)
            .addScaledVector(ty, py)
            .normalize();

          // Check if point is within the spherical triangle (with small margin)
          const bary = sphericalBarycentric(pt, va, vb, vc);
          if (bary && bary.u >= -0.05 && bary.v >= -0.05 && bary.w >= -0.05) {
            const key = `${q},${s}`;
            if (!centerSet.has(key)) {
              centerSet.add(key);
              centers.push(pt);
            }
          }
        }
      }

      // Draw geodesic circles on the sphere for each center
      const linePositions = [];

      centers.forEach(c => {
        const n = c.clone().normalize();
        // Local tangent frame at this circle's center
        let t1 = new THREE.Vector3(0, 1, 0);
        if (Math.abs(n.dot(t1)) > 0.99) t1.set(1, 0, 0);
        const t2 = new THREE.Vector3().crossVectors(n, t1).normalize();
        t1.crossVectors(t2, n).normalize();

        // Draw circle as small-circle on sphere (constant angular radius)
        let prev = null;
        for (let i = 0; i <= segments; i++) {
          const angle = (i / segments) * Math.PI * 2;
          // Point at angular distance circleAngR from center
          const p = n.clone().multiplyScalar(Math.cos(circleAngR))
            .addScaledVector(t1, Math.sin(circleAngR) * Math.cos(angle))
            .addScaledVector(t2, Math.sin(circleAngR) * Math.sin(angle))
            .normalize()
            .multiplyScalar(r);
          if (prev) {
            linePositions.push(prev.x, prev.y, prev.z, p.x, p.y, p.z);
          }
          prev = p;
        }
      });

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));
      const mat = new THREE.LineBasicMaterial({ color: 0xffaa44, transparent: true, opacity: 0.5 });
      this.groups.fol.add(new THREE.LineSegments(geo, mat));
    });
  }

  createCityMarkers() {
    this.groups.cities.clear();
    this.citySprites = {};

    Object.entries(CITIES).forEach(([key, city]) => {
      const pos = latLonToVec3(city.lat, city.lon, GLOBE_RADIUS + 0.015);

      // Dot
      const geo = new THREE.SphereGeometry(0.01, 8, 8);
      const mat = new THREE.MeshBasicMaterial({ color: city.color });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.copy(pos);
      this.groups.cities.add(mesh);

      // Label (canvas sprite)
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.font = '24px Helvetica Neue';
      ctx.textAlign = 'center';
      ctx.fillText(city.name, 128, 40);

      const tex = new THREE.CanvasTexture(canvas);
      const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
      const sprite = new THREE.Sprite(spriteMat);
      sprite.position.copy(latLonToVec3(city.lat, city.lon, GLOBE_RADIUS + 0.06));
      sprite.scale.set(0.3, 0.075, 1);
      this.groups.cities.add(sprite);
      this.citySprites[key] = { mesh, sprite };
    });
  }

  updatePinInfo() {
    const el = document.getElementById('pin-info');
    // Cancel any pending geocode requests
    if (this._geocodeAbort) this._geocodeAbort.abort();
    this._geocodeAbort = new AbortController();
    const signal = this._geocodeAbort.signal;

    let html = `<b>Pinned vertex (#0) → ${CITIES[this.pinCity].name}</b><br>`;
    html += '<div style="margin-top:6px; color:#aaa;">Other vertices:</div>';

    this.pinnedVertices.forEach((v, i) => {
      if (i === 0) return;
      const ll = vec3ToLatLon(v);
      const lat = ll.lat.toFixed(2);
      const lon = ll.lon.toFixed(2);
      const latLabel = ll.lat >= 0 ? 'N' : 'S';
      const lonLabel = ll.lon >= 0 ? 'E' : 'W';
      const gmapsUrl = `https://www.google.com/maps/@${ll.lat.toFixed(4)},${ll.lon.toFixed(4)},6z`;

      html += `<div class="vertex-row">`;
      html += `<a href="${gmapsUrl}" target="_blank" title="Open in Google Maps">`;
      html += `#${i}: <span class="vertex-coords">${Math.abs(lat)}°${latLabel}, ${Math.abs(lon)}°${lonLabel}</span>`;
      html += ` 🗺</a>`;
      html += `<span class="vertex-place loading" id="place-${i}">loading...</span>`;
      html += `</div>`;
    });

    el.innerHTML = html;

    // Reverse geocode each vertex via local proxy → Nominatim
    // Cache results to minimize API calls
    if (!App._geocodeCache) App._geocodeCache = {};

    const geocodeVertex = async (idx) => {
      const ll = vec3ToLatLon(this.pinnedVertices[idx]);
      const placeEl = document.getElementById(`place-${idx}`);
      if (!placeEl) return;

      // Round to 1 decimal for cache key (same general area)
      const cacheKey = `${ll.lat.toFixed(1)},${ll.lon.toFixed(1)}`;
      if (App._geocodeCache[cacheKey]) {
        placeEl.textContent = App._geocodeCache[cacheKey];
        placeEl.classList.remove('loading');
        return;
      }

      try {
        const resp = await fetch(
          `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${ll.lat.toFixed(4)}&longitude=${ll.lon.toFixed(4)}&localityLanguage=en`,
          { signal }
        );
        if (signal.aborted) return;
        const data = await resp.json();
        if (signal.aborted) return;
        let name;
        // BigDataCloud response format
        const parts = [data.locality, data.principalSubdivision, data.countryName].filter(Boolean);
        if (parts.length > 0) {
          name = parts.join(', ');
        } else if (data.display_name) {
          name = data.display_name.split(',').slice(0, 3).join(',').trim();
        } else {
          name = '🌊 Ocean';
        }
        App._geocodeCache[cacheKey] = name;
        placeEl.textContent = name;
      } catch (e) {
        if (signal.aborted) return;
        const name = Math.abs(ll.lat) > 70 ? '🧊 Polar region' : '🌊 Ocean';
        placeEl.textContent = name;
      }
      placeEl.classList.remove('loading');
    };

    // Sequential with 2s delay to respect Nominatim rate limit
    (async () => {
      for (let i = 1; i < this.pinnedVertices.length; i++) {
        if (signal.aborted) return;
        await geocodeVertex(i);
        if (i < this.pinnedVertices.length - 1) {
          await new Promise(r => setTimeout(r, 2000));
        }
      }
    })();
  }

  // ─── Dymaxion Flat View ──────────────────────────────────
  buildFlatView() {
    this.groups.flat.clear();
    const layout = buildDymaxionNet(this.icosaData.faces);
    const linePositions = [];

    // Subdivide each icosa face into small triangles for texture mapping
    const subDiv = 12; // subdivision frequency for texture detail

    this.icosaData.faces.forEach(([ai, bi, ci], faceIdx) => {
      const lf = layout[faceIdx];
      // 2D flat triangle corners (already centered and scaled by buildDymaxionNet)
      const f0 = new THREE.Vector2(lf.verts[0][0], lf.verts[0][1]);
      const f1 = new THREE.Vector2(lf.verts[1][0], lf.verts[1][1]);
      const f2 = new THREE.Vector2(lf.verts[2][0], lf.verts[2][1]);

      // 3D sphere triangle corners (pinned icosahedron)
      const s0 = this.pinnedVertices[ai].clone().normalize();
      const s1 = this.pinnedVertices[bi].clone().normalize();
      const s2 = this.pinnedVertices[ci].clone().normalize();

      // Build subdivided mesh: barycentric grid
      const positions = [];
      const uvs = [];
      const indices = [];
      const grid = [];

      for (let i = 0; i <= subDiv; i++) {
        grid[i] = [];
        for (let j = 0; j <= subDiv - i; j++) {
          const a = i / subDiv, b = j / subDiv, c = 1 - a - b;

          // Flat position (2D -> 3D with z=0)
          const fx = c * f0.x + a * f1.x + b * f2.x;
          const fy = c * f0.y + a * f1.y + b * f2.y;
          positions.push(fx, fy, 0);

          // Spherical position for UV (interpolate on sphere, then convert to equirectangular UV)
          const sp = new THREE.Vector3()
            .addScaledVector(s0, c)
            .addScaledVector(s1, a)
            .addScaledVector(s2, b)
            .normalize();
          const ll = vec3ToLatLon(sp);
          // Equirectangular UV: u = (lon+180)/360, v = (90-lat)/180
          const u = (ll.lon + 180) / 360;
          const v = (90 - ll.lat) / 180;
          uvs.push(u, v);

          grid[i][j] = i * (2 * subDiv - i + 3) / 2 + j; // vertex index
        }
      }

      // Recompute vertex indices properly
      let vertIdx = 0;
      for (let i = 0; i <= subDiv; i++) {
        for (let j = 0; j <= subDiv - i; j++) {
          grid[i][j] = vertIdx++;
        }
      }

      for (let i = 0; i < subDiv; i++) {
        for (let j = 0; j < subDiv - i; j++) {
          indices.push(grid[i][j], grid[i + 1][j], grid[i][j + 1]);
          if (j < subDiv - i - 1) {
            indices.push(grid[i + 1][j], grid[i + 1][j + 1], grid[i][j + 1]);
          }
        }
      }

      const faceGeo = new THREE.BufferGeometry();
      faceGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      faceGeo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
      faceGeo.setIndex(indices);
      faceGeo.computeVertexNormals();

      const faceMat = this.earthTexture
        ? new THREE.MeshBasicMaterial({ map: this.earthTexture, side: THREE.DoubleSide })
        : new THREE.MeshBasicMaterial({
            color: new THREE.Color().setHSL(faceIdx / 20, 0.3, 0.15),
            transparent: true, opacity: 0.5, side: THREE.DoubleSide,
          });
      this.groups.flat.add(new THREE.Mesh(faceGeo, faceMat));

      // Face outline
      linePositions.push(
        f0.x, f0.y, 0.001, f1.x, f1.y, 0.001,
        f1.x, f1.y, 0.001, f2.x, f2.y, 0.001,
        f2.x, f2.y, 0.001, f0.x, f0.y, 0.001,
      );

      // Subdivision overlay lines
      if (this.frequency > 1) {
        for (let i = 0; i < this.frequency; i++) {
          for (let j = 0; j < this.frequency - i; j++) {
            const ba = i / this.frequency, bb = j / this.frequency, bc = 1 - ba - bb;
            const ba2 = (i+1) / this.frequency, bb2 = (j+1) / this.frequency;
            const p0x = bc * f0.x + ba * f1.x + bb * f2.x;
            const p0y = bc * f0.y + ba * f1.y + bb * f2.y;
            const bc1 = 1 - ba2 - bb;
            const p1x = bc1 * f0.x + ba2 * f1.x + bb * f2.x;
            const p1y = bc1 * f0.y + ba2 * f1.y + bb * f2.y;
            const bc2 = 1 - ba - bb2;
            const p2x = bc2 * f0.x + ba * f1.x + bb2 * f2.x;
            const p2y = bc2 * f0.y + ba * f1.y + bb2 * f2.y;
            linePositions.push(
              p0x, p0y, 0.002, p1x, p1y, 0.002,
              p1x, p1y, 0.002, p2x, p2y, 0.002,
              p2x, p2y, 0.002, p0x, p0y, 0.002,
            );
            if (j < this.frequency - i - 1) {
              const bc3 = 1 - ba2 - bb2;
              const p3x = bc3 * f0.x + ba2 * f1.x + bb2 * f2.x;
              const p3y = bc3 * f0.y + ba2 * f1.y + bb2 * f2.y;
              linePositions.push(
                p1x, p1y, 0.002, p3x, p3y, 0.002,
                p3x, p3y, 0.002, p2x, p2y, 0.002,
              );
            }
          }
        }
      }

      // Face label
      const cx = (f0.x + f1.x + f2.x) / 3;
      const cy = (f0.y + f1.y + f2.y) / 3;
      const canvas = document.createElement('canvas');
      canvas.width = 64; canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.font = '24px Helvetica Neue';
      ctx.textAlign = 'center';
      ctx.fillText(faceIdx.toString(), 32, 40);
      const tex = new THREE.CanvasTexture(canvas);
      const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
      const sprite = new THREE.Sprite(spriteMat);
      sprite.position.set(cx, cy, 0.01);
      sprite.scale.set(0.1, 0.1, 1);
      this.groups.flat.add(sprite);
    });

    // Flat city markers — using proper spherical point-in-triangle + gnomonic barycentric
    if (this.showCities) {
      // Helper: project a lat/lon point onto the flat Dymaxion layout
      const projectToFlat = (lat, lon) => {
        const pos3D = latLonToVec3(lat, lon).normalize();
        const result = findFaceAndBary(pos3D, this.icosaData.faces, this.pinnedVertices);
        if (!result) return null;
        const lf = layout[result.faceIdx];
        const [fv0, fv1, fv2] = lf.verts;
        return {
          x: result.u * fv0[0] + result.v * fv1[0] + result.w * fv2[0],
          y: result.u * fv0[1] + result.v * fv1[1] + result.w * fv2[1],
        };
      };

      Object.entries(CITIES).forEach(([key, city]) => {
        const flat = projectToFlat(city.lat, city.lon);
        if (!flat) return;

        const dotGeo = new THREE.SphereGeometry(0.015, 8, 8);
        const dotMat = new THREE.MeshBasicMaterial({ color: city.color });
        const dot = new THREE.Mesh(dotGeo, dotMat);
        dot.position.set(flat.x, flat.y, 0.02);
        this.groups.flat.add(dot);

        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.font = '24px Helvetica Neue';
        ctx.textAlign = 'center';
        ctx.fillText(city.name, 128, 40);
        const tex = new THREE.CanvasTexture(canvas);
        const sMat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
        const sprite = new THREE.Sprite(sMat);
        sprite.position.set(flat.x, flat.y + 0.06, 0.03);
        sprite.scale.set(0.3, 0.075, 1);
        this.groups.flat.add(sprite);
      });

      // Also project preset markers if active
      if (this.activePreset !== 'none' && POINT_SETS[this.activePreset]) {
        POINT_SETS[this.activePreset].points.forEach((pt, i) => {
          const flat = projectToFlat(pt.lat, pt.lon);
          if (!flat) return;
          const hue = i / 12;
          const color = new THREE.Color().setHSL(hue, 0.8, 0.6);
          const geo = new THREE.OctahedronGeometry(0.018, 0);
          const mat = new THREE.MeshBasicMaterial({ color });
          const mesh = new THREE.Mesh(geo, mat);
          mesh.position.set(flat.x, flat.y, 0.02);
          this.groups.flat.add(mesh);

          const canvas = document.createElement('canvas');
          canvas.width = 256; canvas.height = 48;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = `hsl(${hue * 360}, 80%, 75%)`;
          ctx.font = '18px Helvetica Neue';
          ctx.textAlign = 'center';
          ctx.fillText(pt.name, 128, 30);
          const tex = new THREE.CanvasTexture(canvas);
          const sMat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
          const sprite = new THREE.Sprite(sMat);
          sprite.position.set(flat.x, flat.y + 0.05, 0.03);
          sprite.scale.set(0.3, 0.05, 1);
          this.groups.flat.add(sprite);
        });
      }
    }

    const edgeGeo = new THREE.BufferGeometry();
    edgeGeo.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));
    const edgeMat = new THREE.LineBasicMaterial({ color: 0x6af0ff, transparent: true, opacity: 0.8 });
    this.groups.flat.add(new THREE.LineSegments(edgeGeo, edgeMat));

    this.groups.flat.visible = false;
  }

  setMode(mode) {
    this.mode = mode;
    const isGlobe = mode === 'globe';

    this.groups.globe.visible = isGlobe;
    this.groups.icosa.visible = isGlobe;
    this.groups.subdivision.visible = isGlobe;
    this.groups.fol.visible = isGlobe && this.showFOL;
    this.groups.cities.visible = isGlobe && this.showCities;

    if (!isGlobe) {
      this.buildFlatView();
      this.groups.flat.visible = true;
      this.camera.position.set(0, 0, 5);
      this.controls.target.set(0, 0, 0);
    } else {
      this.groups.flat.visible = false;
      this.camera.position.set(0, 0, 3);
      this.controls.target.set(0, 0, 0);
    }

    this.controls.update();

    document.getElementById('btn-globe').classList.toggle('active', isGlobe);
    document.getElementById('btn-flat').classList.toggle('active', !isGlobe);
  }

  setupUI() {
    document.getElementById('btn-globe').onclick = () => this.setMode('globe');
    document.getElementById('btn-flat').onclick = () => this.setMode('flat');

    document.getElementById('frequency').oninput = (e) => {
      this.frequency = parseInt(e.target.value);
      document.getElementById('freq-val').textContent = this.frequency;
      this.updateIcosahedron();
      if (this.mode === 'flat') { this.buildFlatView(); this.groups.flat.visible = true; }
    };

    document.getElementById('spin').oninput = (e) => {
      this.spinAngle = parseInt(e.target.value);
      document.getElementById('spin-val').textContent = this.spinAngle + '°';
      this.updateIcosahedron();
      if (this.mode === 'flat') { this.buildFlatView(); this.groups.flat.visible = true; }
    };

    document.getElementById('show-fol').onchange = (e) => {
      this.showFOL = e.target.checked;
      this.updateIcosahedron();
      this.groups.fol.visible = this.showFOL;
    };

    document.getElementById('show-cities').onchange = (e) => {
      this.showCities = e.target.checked;
      this.groups.cities.visible = this.showCities;
    };

    document.getElementById('show-pentagons').onchange = (e) => {
      this.showPentagons = e.target.checked;
      this.groups.pentagons.clear();
      if (this.showPentagons) this.drawPentagonDefects();
      this.groups.pentagons.visible = this.showPentagons;
    };

    document.getElementById('pin-city').onchange = (e) => {
      this.pinCity = e.target.value;
      this.updateIcosahedron();
      if (this.mode === 'flat') { this.buildFlatView(); this.groups.flat.visible = true; }
    };

    document.getElementById('preset-set').onchange = (e) => {
      this.activePreset = e.target.value;
      this.drawPresetMarkers();
      const desc = document.getElementById('preset-desc');
      if (this.activePreset !== 'none' && POINT_SETS[this.activePreset]) {
        desc.textContent = POINT_SETS[this.activePreset].desc;
      } else {
        desc.textContent = '';
      }
    };
  }

  drawPresetMarkers() {
    this.groups.presetMarkers.clear();
    if (this.activePreset === 'none' || !POINT_SETS[this.activePreset]) return;

    const set = POINT_SETS[this.activePreset];
    const markerR = GLOBE_RADIUS + 0.008;

    set.points.forEach((pt, i) => {
      const pos = latLonToVec3(pt.lat, pt.lon, markerR);

      // Diamond marker
      const geo = new THREE.OctahedronGeometry(0.018, 0);
      const hue = i / 12;
      const color = new THREE.Color().setHSL(hue, 0.8, 0.6);
      const mat = new THREE.MeshBasicMaterial({ color });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.copy(pos);
      this.groups.presetMarkers.add(mesh);

      // Label
      const canvas = document.createElement('canvas');
      canvas.width = 512; canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = `hsl(${hue * 360}, 80%, 75%)`;
      ctx.font = '20px Helvetica Neue';
      ctx.textAlign = 'center';
      ctx.fillText(pt.name, 256, 24);
      ctx.font = '14px Helvetica Neue';
      ctx.fillStyle = '#aaa';
      ctx.fillText(pt.sig.slice(0, 40), 256, 48);

      const tex = new THREE.CanvasTexture(canvas);
      const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
      const sprite = new THREE.Sprite(spriteMat);
      sprite.position.copy(latLonToVec3(pt.lat, pt.lon, markerR + 0.04));
      sprite.scale.set(0.4, 0.05, 1);
      this.groups.presetMarkers.add(sprite);
    });
  }

  onResize() {
    this.camera.aspect = innerWidth / innerHeight;
    this.camera.updateProjectionMatrix();
    this.renderer.setSize(innerWidth, innerHeight);
  }

  animate() {
    requestAnimationFrame(() => this.animate());
    this.controls.update();
    this.renderer.render(this.scene, this.camera);
  }
}

// ─── Spherical Barycentric Coordinates ───────────────────────
// Proper spherical point-in-triangle test + gnomonic barycentric coordinates
function findFaceAndBary(point, faces, vertices) {
  const p = point.clone().normalize();

  for (let fi = 0; fi < faces.length; fi++) {
    const [ai, bi, ci] = faces[fi];
    const a = vertices[ai].clone().normalize();
    const b = vertices[bi].clone().normalize();
    const c = vertices[ci].clone().normalize();

    // Cross product sign test: point is inside spherical triangle if
    // it's on the same side of all three great circle arcs
    const d0 = new THREE.Vector3().crossVectors(a, b).dot(p);
    const d1 = new THREE.Vector3().crossVectors(b, c).dot(p);
    const d2 = new THREE.Vector3().crossVectors(c, a).dot(p);

    if ((d0 >= -1e-6 && d1 >= -1e-6 && d2 >= -1e-6) ||
        (d0 <= 1e-6 && d1 <= 1e-6 && d2 <= 1e-6)) {

      // Gnomonic projection onto tangent plane at face centroid
      const centroid = new THREE.Vector3().add(a).add(b).add(c).normalize();
      const dA = a.dot(centroid), dB = b.dot(centroid);
      const dC = c.dot(centroid), dP = p.dot(centroid);
      if (Math.abs(dP) < 1e-10) continue; // point on opposite hemisphere

      const pA = a.clone().divideScalar(dA);
      const pB = b.clone().divideScalar(dB);
      const pC = c.clone().divideScalar(dC);
      const pP = p.clone().divideScalar(dP);

      // 2D barycentric on gnomonic-projected points
      const v0 = pB.clone().sub(pA);
      const v1 = pC.clone().sub(pA);
      const v2 = pP.clone().sub(pA);

      const d00 = v0.dot(v0), d01 = v0.dot(v1), d11 = v1.dot(v1);
      const d20 = v2.dot(v0), d21 = v2.dot(v1);
      const denom = d00 * d11 - d01 * d01;
      if (Math.abs(denom) < 1e-12) continue;

      const bv = (d11 * d20 - d01 * d21) / denom;
      const bw = (d00 * d21 - d01 * d20) / denom;
      const bu = 1 - bv - bw;

      return { faceIdx: fi, u: bu, v: bv, w: bw };
    }
  }
  return null;
}

// Legacy wrapper for FOL code that still calls this
function sphericalBarycentric(p, a, b, c) {
  const v0 = b.clone().sub(a);
  const v1 = c.clone().sub(a);
  const v2 = p.clone().sub(a);
  const d00 = v0.dot(v0), d01 = v0.dot(v1), d11 = v1.dot(v1);
  const d20 = v2.dot(v0), d21 = v2.dot(v1);
  const denom = d00 * d11 - d01 * d01;
  if (Math.abs(denom) < 1e-10) return null;
  const v = (d11 * d20 - d01 * d21) / denom;
  const w = (d00 * d21 - d01 * d20) / denom;
  return { u: 1 - v - w, v, w };
}
